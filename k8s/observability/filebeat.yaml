apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: quetxal-tv-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
  - kind: ServiceAccount
    name: filebeat
    namespace: quetxal-tv-prod
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: quetxal-tv-prod
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: container
        paths: ["/var/log/containers/*.log"]
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"
    output.logstash:
      hosts: ["${MONITOR_PRIVATE_IP}:5044"]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: quetxal-tv-prod
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.13.4
          args: ["-c", "/etc/filebeat.yml", "-e"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            runAsUser: 0
          volumeMounts:
            - { name: config, mountPath: /etc/filebeat.yml, subPath: filebeat.yml, readOnly: true }
            - { name: data, mountPath: /usr/share/filebeat/data }
            - { name: varlogcontainers, mountPath: /var/log/containers, readOnly: true }
            - { name: varlogpods, mountPath: /var/log/pods, readOnly: true }
            - { name: varlibdockercontainers, mountPath: /var/lib/docker/containers, readOnly: true }
      volumes:
        - { name: config, configMap: { defaultMode: 0640, name: filebeat-config } }
        - { name: data, hostPath: { path: /var/lib/filebeat-data, type: DirectoryOrCreate } }
        - { name: varlogcontainers, hostPath: { path: /var/log/containers } }
        - { name: varlogpods, hostPath: { path: /var/log/pods } }
        - { name: varlibdockercontainers, hostPath: { path: /var/lib/docker/containers } }
