apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: notification-db-pvc, namespace: quetxal-tv-prod }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: notification-db, namespace: quetxal-tv-prod }
spec:
  replicas: 1
  selector: { matchLabels: { app: notification-db } }
  template:
    metadata: { labels: { app: notification-db } }
    spec:
      containers:
        - name: notification-db
          image: ${ARTIFACT_REGISTRY_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/notification-db:${IMAGE_TAG}
          ports: [{ containerPort: 5432 }]
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: NOTIFICATION_DB_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: NOTIFICATION_DB_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: NOTIFICATION_DB_NAME } }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          readinessProbe: { exec: { command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""] }, initialDelaySeconds: 10, periodSeconds: 10, failureThreshold: 5 }
          livenessProbe: { exec: { command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""] }, initialDelaySeconds: 20, periodSeconds: 30, failureThreshold: 3 }
      volumes: [{ name: data, persistentVolumeClaim: { claimName: notification-db-pvc } }]
---
apiVersion: v1
kind: Service
metadata: { name: notification-db, namespace: quetxal-tv-prod }
spec:
  type: ClusterIP
  selector: { app: notification-db }
  ports: [{ port: 5432, targetPort: 5432 }]
