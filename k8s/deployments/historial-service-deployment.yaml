apiVersion: apps/v1
kind: Deployment
metadata: { name: historial-service, namespace: quetxal-tv-prod }
spec:
  replicas: 1
  selector: { matchLabels: { app: historial-service } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  template:
    metadata: { labels: { app: historial-service } }
    spec:
      containers:
        - name: historial-service
          image: ${ARTIFACT_REGISTRY_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/historial-service:${IMAGE_TAG}
          ports: [{ containerPort: 50054 }]
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
          env:
            - { name: HISTORIAL_SERVICE_PORT, value: "50054" }
            - name: DB_HOST
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: HISTORIAL_DB_HOST } }
            - name: DB_PORT
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: HISTORIAL_DB_PORT } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: HISTORIAL_DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: HISTORIAL_DB_PASSWORD } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: HISTORIAL_DB_NAME } }
            - name: DB_SCHEMA
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: HISTORIAL_DB_SCHEMA } }
            - { name: DB_SSLMODE, value: "disable" }
          readinessProbe: { grpc: { port: 50054, service: historial-service-readiness }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 6 }
          livenessProbe: { grpc: { port: 50054, service: historial-service-liveness }, initialDelaySeconds: 90, periodSeconds: 20, failureThreshold: 3 }
