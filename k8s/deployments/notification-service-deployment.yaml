apiVersion: apps/v1
kind: Deployment
metadata: { name: notification-service, namespace: quetxal-tv-prod }
spec:
  replicas: 2
  selector: { matchLabels: { app: notification-service } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  template:
    metadata: { labels: { app: notification-service } }
    spec:
      containers:
        - name: notification-service
          image: ${ARTIFACT_REGISTRY_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/notification-service:${IMAGE_TAG}
          ports: [{ containerPort: 50056 }]
          resources:
            requests: { cpu: "25m", memory: "64Mi" }
            limits: { cpu: "150m", memory: "160Mi" }
          envFrom: [{ configMapRef: { name: quetxal-tv-config } }]
          env:
            - { name: GRPC_PORT, value: "50056" }
            - name: DB_HOST
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: NOTIFICATION_DB_HOST } }
            - name: DB_PORT
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: NOTIFICATION_DB_PORT } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: NOTIFICATION_DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: NOTIFICATION_DB_PASSWORD } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: NOTIFICATION_DB_NAME } }
            - name: DB_SCHEMA
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: NOTIFICATION_DB_SCHEMA } }
            - { name: DB_SSLMODE, value: "disable" }
            - name: SMTP_USER
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: SMTP_USER } }
            - name: SMTP_PASSWORD
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: SMTP_PASSWORD } }
            - name: SMTP_FROM
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: SMTP_FROM } }
          readinessProbe: { tcpSocket: { port: 50056 }, initialDelaySeconds: 10, periodSeconds: 8, failureThreshold: 3 }
          livenessProbe: { tcpSocket: { port: 50056 }, initialDelaySeconds: 25, periodSeconds: 20, failureThreshold: 3 }
