apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalogo-service
  namespace: quetxal-tv-prod
  annotations:
    iam.gke.io/gcp-service-account: ${GCP_SA_EMAIL}
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: catalogo-service, namespace: quetxal-tv-prod }
spec:
  replicas: 1
  selector: { matchLabels: { app: catalogo-service } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 0, maxUnavailable: 1 }
  template:
    metadata: { labels: { app: catalogo-service } }
    spec:
      serviceAccountName: catalogo-service
      containers:
        - name: catalogo-service
          image: ${ARTIFACT_REGISTRY_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/catalogo-service:${IMAGE_TAG}
          ports:
            - { name: grpc, containerPort: 50052 }
            - { name: http, containerPort: 8082 }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
          env:
            - { name: GRPC_PORT, value: "50052" }
            - name: DB_HOST
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: CATALOGO_DB_HOST } }
            - name: DB_PORT
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: CATALOGO_DB_PORT } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: CATALOGO_DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: CATALOGO_DB_PASSWORD } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: CATALOGO_DB_NAME } }
            - { name: DB_SSLMODE, value: "disable" }
            - { name: AUDIT_HTTP_PORT, value: "8082" }
            - name: GCS_BUCKET_NAME
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: GCS_BUCKET_NAME } }
            - name: GCS_SERVICE_ACCOUNT_EMAIL
              valueFrom: { secretKeyRef: { name: quetxal-tv-secrets, key: GCS_SERVICE_ACCOUNT_EMAIL } }
          readinessProbe: { grpc: { port: 50052, service: catalogo-service-readiness }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 6 }
          livenessProbe: { grpc: { port: 50052, service: catalogo-service-liveness }, initialDelaySeconds: 90, periodSeconds: 20, failureThreshold: 3 }
