services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      FX_SERVICE_HOST: fx-service:50055
      JWT_SECRET: ${JWT_SECRET}
      SUBSCRIPTION_SERVICE_URL: subscription-service:50053
      AUTH_SERVICE_HOST: auth-service:50051
      AUTH_SERVICE_URL: auth-service:50051
      NOTIFICATION_SERVICE_HOST: notification-service:50056
      CATALOG_SERVICE_URL: catalog-service:50052
    depends_on:
      - auth-service
      - subscription-service
      - notification-service
    networks:
      - quetxal-network

  # ──────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: auth_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./database/auth/auth.sql:/docker-entrypoint-initdb.d/01_auth.sql
      - ./database/auth/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quetxal-network

  auth-service:
    build:
      context: ./microservices/auth-service/auth-service
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    env_file:
      - path: ./microservices/auth-service/auth-service/.env
        required: false
    environment:
      GRPC_PORT: 50051
      NOTIFICATION_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT: 50056
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: auth_user
      DB_PASSWORD: admin
      DB_NAME: auth_db
      DB_SSLMODE: disable
      DB_SCHEMA: auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      auth-db:
        condition: service_healthy
      notification-service:
        condition: service_started
    networks:
      - quetxal-network

  # ──────────────────────────────────────────────
  # NOTIFICATION
  # ──────────────────────────────────────────────
  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: notificacion_user
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: notificacion_db
    volumes:
      - notification_db_data:/var/lib/postgresql/data
      - ./database/notificacion.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notificacion_user -d notificacion_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quetxal-network

  notification-service:
    build:
      context: ./microservices/notification-service
      dockerfile: Dockerfile
    ports:
      - "50056:50056"
    environment:
      GRPC_PORT: 50056
      DB_HOST: notification-db
      DB_PORT: 5432
      DB_USER: notificacion_user
      DB_PASSWORD: admin
      DB_NAME: notificacion_db
      DB_SSLMODE: disable
      DB_SCHEMA: notification
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 465
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      notification-db:
        condition: service_healthy
    networks:
      - quetxal-network

  # ──────────────────────────────────────────────
  # CATALOG
  # ──────────────────────────────────────────────
  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
      POSTGRES_DB: catalog_db
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
      - ./database/catalogo.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quetxal-network

  catalog-service:
    build:
      context: ./microservices/catalogo-service
      dockerfile: Dockerfile
    container_name: catalog-service
    ports:
      - "50052:50052"
    environment:
      DB_HOST: catalog-db
      DB_PORT: 5432
      DB_USER: catalog_user
      DB_PASSWORD: catalog_pass
      DB_NAME: catalog_db
      DB_SSLMODE: disable
      GRPC_PORT: 50052
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - quetxal-network

  # ──────────────────────────────────────────────
  # SUBSCRIPTION
  # ──────────────────────────────────────────────
  subscription-db:
    image: postgres:16-alpine
    container_name: subscription-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: subscription_user
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: subscription_db
    volumes:
      - subscription_db_data:/var/lib/postgresql/data
      - ./database/subscription.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscription_user -d subscription_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quetxal-network

  subscription-service:
    build:
      context: ./microservices/subscription-service
      dockerfile: Dockerfile
    ports:
      - "50053:50053"
    environment:
      GRPC_PORT: 50053
      FX_SERVICE_HOST: fx-service:50055
      NOTIFICATION_SERVICE_HOST: notification-service:50056
      DB_HOST: subscription-db
      DB_PORT: 5432
      DB_USER: subscription_user
      DB_PASSWORD: admin
      DB_NAME: subscription_db
    depends_on:
      subscription-db:
        condition: service_healthy
      notification-service:
        condition: service_started
    networks:
      - quetxal-network

  # ──────────────────────────────────────────────
  # FX
  # ──────────────────────────────────────────────
  fx-db:
    image: postgres:16-alpine
    container_name: fx-db
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: fx_user
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: fx_db
    volumes:
      - fx_db_data:/var/lib/postgresql/data
      - ./database/fx.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fx_user -d fx_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quetxal-network

  fx-service:
    build:
      context: .
      dockerfile: ./microservices/fx-service/Dockerfile
    ports:
      - "50055:50055"
    environment:
      GRPC_PORT: 50055
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL: 3600
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY}
      EXCHANGE_API_URL: https://v6.exchangerate-api.com/v6
      DB_HOST: fx-db
      DB_PORT: 5432
      DB_USER: fx_user
      DB_PASSWORD: admin
      DB_NAME: fx_db
    depends_on:
      fx-db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - quetxal-network

  # ──────────────────────────────────────────────
  # HISTORIAL
  # ──────────────────────────────────────────────
  historial-db:
    image: postgres:16-alpine
    container_name: historial-db
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: historial_user
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: historial_db
    volumes:
      - historial_db_data:/var/lib/postgresql/data
      - ./database/historial.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historial_user -d historial_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quetxal-network

  historial-service:
    build:
      context: ./microservices/historial-service
      dockerfile: Dockerfile
    container_name: quetxaltv-historial-service
    env_file:
      - path: ./microservices/historial-service/.env
        required: false
    ports:
      - "50054:50054"
    environment:
      DB_HOST: historial-db
      DB_PORT: 5432
      DB_USER: historial_user
      DB_PASSWORD: admin
      DB_NAME: historial_db
    depends_on:
      historial-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - quetxal-network

  # ──────────────────────────────────────────────
  # REDIS
  # ──────────────────────────────────────────────
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - quetxal-network

volumes:
  auth_db_data:
  notification_db_data:
  catalog_db_data:
  subscription_db_data:
  fx_db_data:
  historial_db_data:

networks:
  quetxal-network:
    driver: bridge
