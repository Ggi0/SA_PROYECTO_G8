syntax = "proto3";

package auth;

// ─────────────────────────────────────────────
//  AUTH SERVICE  (expuesto para API Gateway y otros micros)
// ─────────────────────────────────────────────

service AuthService {

  // ── Autenticación ──────────────────────────
  rpc Register        (RegisterRequest)       returns (RegisterResponse);
  rpc Login           (LoginRequest)          returns (LoginResponse);
  rpc RefreshToken    (RefreshTokenRequest)   returns (RefreshTokenResponse);
  rpc Logout          (LogoutRequest)         returns (LogoutResponse);
  rpc LogoutAll       (LogoutAllRequest)      returns (LogoutAllResponse);

  // ── Cuenta ─────────────────────────────────
  rpc GetMe           (GetMeRequest)          returns (GetMeResponse);
  rpc ChangePassword  (ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ForgotPassword  (ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword   (ResetPasswordRequest)  returns (ResetPasswordResponse);

  // ── Perfiles ───────────────────────────────
  rpc ListProfiles    (ListProfilesRequest)   returns (ListProfilesResponse);
  rpc CreateProfile   (CreateProfileRequest)  returns (CreateProfileResponse);
  rpc UpdateProfile   (UpdateProfileRequest)  returns (UpdateProfileResponse);
  rpc DeleteProfile   (DeleteProfileRequest)  returns (DeleteProfileResponse);
  rpc SelectProfile   (SelectProfileRequest)  returns (SelectProfileResponse);

  // ── Validación inter-servicios ─────────────
  rpc ValidateToken   (ValidateTokenRequest)  returns (ValidateTokenResponse);
  rpc GetUserById     (GetUserByIdRequest)    returns (GetUserByIdResponse);

  // ── Auditoría ─────────────────────────────
  rpc GetAuditLogs     (GetAuditLogsRequest) returns (GetAuditLogsResponse);
  rpc ExportAuditLogs  (ExportAuditLogsRequest) returns (ExportAuditLogsResponse);



}





// ─────────────────────────────────────────────
//  MENSAJES COMPARTIDOS
// ─────────────────────────────────────────────

message ProfileMessage {
  string profile_id   = 1;
  string display_name = 2;
  string avatar_url   = 3;
  bool   is_kids_mode = 4;
}

// ─────────────────────────────────────────────
//  AUTENTICACIÓN
// ─────────────────────────────────────────────

message RegisterRequest {
  string email        = 1;
  string password     = 2;
  string display_name = 3;
}

message RegisterResponse {
  string user_id    = 1;
  string profile_id = 2;
  string message    = 3;
}

message LoginRequest {
  string email       = 1;
  string password    = 2;
  string device_info = 3;
  string ip_address  = 4;
}

message UserInfo {
  string user_id = 1;
  string email   = 2;
  string role    = 3;
}

message LoginResponse {
  string                  access_token      = 1;
  int32                   expires_in        = 2;
  string                  refresh_token     = 3;
  UserInfo                user              = 4;
  repeated ProfileMessage profiles          = 5;
  string                  active_profile_id = 6;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token      = 1;
  int32  expires_in        = 2;
  string active_profile_id = 3;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  string message = 1;
}

message LogoutAllRequest {
  string user_id = 1;
}

message LogoutAllResponse {
  string message = 1;
}

// ─────────────────────────────────────────────
//  CUENTA
// ─────────────────────────────────────────────

message GetMeRequest {
  string user_id           = 1;
  string active_profile_id = 2;
}

message GetMeResponse {
  UserInfo user              = 1;
  string   active_profile_id = 2;
}

message ChangePasswordRequest {
  string user_id          = 1;
  string current_password = 2;
  string new_password     = 3;
}

message ChangePasswordResponse {
  string message = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {
  string message = 1;
}

message ResetPasswordRequest {
  string token        = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  string message = 1;
}

// ─────────────────────────────────────────────
//  PERFILES
// ─────────────────────────────────────────────

message ListProfilesRequest {
  string user_id = 1;
}

message ListProfilesResponse {
  repeated ProfileMessage profiles    = 1;
  int32                   count       = 2;
  int32                   max_allowed = 3;
}

message CreateProfileRequest {
  string user_id      = 1;
  string display_name = 2;
  bool   is_kids_mode = 3;
  string avatar_url   = 4;
}

message CreateProfileResponse {
  ProfileMessage profile = 1;
}

message UpdateProfileRequest {
  string user_id      = 1;
  string profile_id   = 2;
  string display_name = 3;
  string avatar_url   = 4;
  bool   is_kids_mode = 5;
}

message UpdateProfileResponse {
  ProfileMessage profile = 1;
}

message DeleteProfileRequest {
  string user_id    = 1;
  string profile_id = 2;
}

message DeleteProfileResponse {
  string message = 1;
}

message SelectProfileRequest {
  string user_id    = 1;
  string profile_id = 2;
}

message SelectProfileResponse {
  string         access_token   = 1;
  ProfileMessage active_profile = 2;
}

// ─────────────────────────────────────────────
//  VALIDACIÓN INTER-SERVICIOS
// ─────────────────────────────────────────────

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool   valid             = 1;
  string user_id           = 2;
  string email             = 3;
  string role              = 4;
  string active_profile_id = 5;
  int32  token_version     = 6;
}

message GetUserByIdRequest {
  string user_id = 1;
}

message GetUserByIdResponse {
  string user_id   = 1;
  string email     = 2;
  string role      = 3;
  bool   is_active = 4;
}

// ─────────────────────────────────────────────
//  AUDITORÍA
// ─────────────────────────────────────────────

message GetAuditLogsRequest {
  string admin_user_id = 1;

  string user_id    = 2;
  string table_name = 3;
  string operation  = 4; // INSERT, UPDATE, DELETE

  string from_date  = 5;
  string to_date    = 6;

  int32 page      = 7;
  int32 page_size = 8;

  bool include_old_data = 9;
  bool include_new_data = 10;
}

message AuditLogMessage {
  string audit_id = 1;

  string table_name = 2;
  string operation  = 3;

  string user_id  = 4;
  string record_id = 5;

  string changed_at = 6;

  string old_data = 7;
  string new_data = 8;
}

message GetAuditLogsResponse {
  repeated AuditLogMessage logs = 1;

  int32 total_records = 2;
  int32 page          = 3;
  int32 page_size     = 4;
}


// ─────────────────────────────────────────────
//  EXPORTACIÓN DE REPORTES
// ─────────────────────────────────────────────

message ExportAuditLogsRequest {
  string admin_user_id = 1;

  string format = 2; // "csv" | "pdf"

  string user_id    = 3;
  string table_name = 4;
  string operation  = 5;

  string from_date = 6;
  string to_date   = 7;
}

message ExportAuditLogsResponse {
  bytes  file      = 1;
  string file_name = 2;
}

