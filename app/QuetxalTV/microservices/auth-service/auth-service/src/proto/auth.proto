syntax = "proto3";

package auth;

// ─────────────────────────────────────────────
//  AUTH SERVICE  (expuesto para otros micros)
// ─────────────────────────────────────────────

service AuthService {
  // Verificar un access token y devolver el payload
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);

  // Renovar access token a partir de un refresh token
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);

  // Obtener datos básicos del usuario por ID
  rpc GetUserById (GetUserByIdRequest) returns (UserResponse);
}

// ─────────────────────────────────────────────
//  MENSAJES — TOKEN
// ─────────────────────────────────────────────

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool   valid             = 1;
  string user_id           = 2;
  string email             = 3;
  string role              = 4;
  string active_profile_id = 5;  // vacío si no hay perfil activo
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token      = 1;
  int32  expires_in        = 2;   // segundos
  string active_profile_id = 3;
}

// ─────────────────────────────────────────────
//  MENSAJES — USUARIO
// ─────────────────────────────────────────────

message GetUserByIdRequest {
  string user_id = 1;
}

message UserResponse {
  string user_id   = 1;
  string email     = 2;
  string role      = 3;
  bool   is_active = 4;
}

