syntax = "proto3";

package download;

// ─────────────────────────────────────────────
// Enums
// ─────────────────────────────────────────────

enum SubscriptionPlan {
  PLAN_UNKNOWN  = 0;
  PLAN_BASIC    = 1;
  PLAN_STANDARD = 2;
  PLAN_PREMIUM  = 3;
}

enum DownloadStatus {
  STATUS_UNKNOWN   = 0;
  STATUS_QUEUED    = 1;
  STATUS_PENDING   = 2;
  STATUS_COMPLETED = 3;
  STATUS_FAILED    = 4;
  STATUS_DELETED   = 5;
}

// ─────────────────────────────────────────────
// Mensajes
// ─────────────────────────────────────────────

message InitiateDownloadRequest {
  string user_id    = 1;
  string profile_id = 2;
  string content_id = 3;
  SubscriptionPlan plan = 4;
}

message InitiateDownloadResponse {
  bool   allowed       = 1;
  string download_id   = 2;
  string message       = 3;
  string gcs_url       = 4;
  int64  expires_at    = 5;
}

message ListDownloadsRequest {
  string user_id    = 1;
  string profile_id = 2;
  SubscriptionPlan plan = 3;
}

message DownloadItem {
  string download_id  = 1;
  string content_id   = 2;
  string title        = 3;
  string thumbnail    = 4;
  DownloadStatus status = 5;
  int64  created_at   = 6;
  int64  expires_at   = 7;
  int64  size_bytes   = 8;
}

message ListDownloadsResponse {
  bool   allowed  = 1;
  string message  = 2;
  repeated DownloadItem downloads = 3;
}

message DeleteDownloadRequest {
  string user_id     = 1;
  string profile_id  = 2;
  string download_id = 3;
  SubscriptionPlan plan = 4;
}

message DeleteDownloadResponse {
  bool   success = 1;
  string message = 2;
}

// ─────────────────────────────────────────────
// Servicio
// ─────────────────────────────────────────────

service DownloadService {
  rpc InitiateDownload(InitiateDownloadRequest) returns (InitiateDownloadResponse);
  rpc ListDownloads(ListDownloadsRequest)       returns (ListDownloadsResponse);
  rpc DeleteDownload(DeleteDownloadRequest)     returns (DeleteDownloadResponse);
}
