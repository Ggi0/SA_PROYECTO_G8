<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; color:#333; margin:0; padding:20px;">
  <div style="max-width:600px; margin:0 auto; background:#ffffff; border-radius:12px; overflow:hidden; border:1px solid #ddd;">
    
    <div style="background:#e8a020; padding:32px; text-align:center;">
      <h1 style="margin:0; color:#0f0f0f; font-size:28px;">🎬 QuetxalTV</h1>
    </div>

    <div style="padding:32px;">
      <h2 style="color:#e8a020;">Recibo de compra</h2>
      <p style="color:#333;">Hola <strong>{{ name }}</strong>, tu suscripción ha sido activada exitosamente.</p>
      
      <div style="background:#f9f9f9; border-radius:8px; padding:20px; margin:20px 0; border:1px solid #eee;">
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #ddd;">
          <span style="color:#555;">Plan</span>
          <span style="color:#333; font-weight:bold;">{{ plan_name }}</span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #ddd;">
          <span style="color:#555;">ID de transacción</span>
          <span style="color:#333; font-size:12px;">{{ transaction_id }}</span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:8px 0;">
          <span style="color:#555; font-weight:bold;">Total pagado</span>
          <span style="color:#e8a020; font-weight:bold;">{{ currency }} {{ amount }}</span>
        </div>
      </div>

      <p style="color:#333;">Gracias por suscribirte. ¡Disfruta QuetxalTV!</p>
    </div>

    <div style="padding:20px; text-align:center; background:#f4f4f4; border-top:1px solid #ddd;">
      <p style="color:#999; font-size:12px; margin:0;">© 2026 QuetxalTV. Todos los derechos reservados.</p>
    </div>

  </div>
</body>
</html>
