syntax = "proto3";

package notification;

option go_package = "subscription-service/proto/notification;notification";

service NotificationService {
  rpc SendPurchaseReceipt(SendPurchaseReceiptRequest) returns (SendPurchaseReceiptResponse);
  rpc SendWelcomeEmail(SendWelcomeEmailRequest)       returns (SendWelcomeEmailResponse);
  rpc SendNewContentAlert(NewContentAlertRequest)     returns (NewContentAlertResponse);
}

message SendPurchaseReceiptRequest {
  string user_id        = 1;
  string user_email     = 2;
  string plan_name      = 3;
  double amount         = 4;
  string currency       = 5;
  string transaction_id = 6;
}

message SendPurchaseReceiptResponse {
  bool   success = 1;
  string message = 2;
}

message SendWelcomeEmailRequest {
  string user_id    = 1;
  string user_email = 2;
  string user_name  = 3;
}

message SendWelcomeEmailResponse {
  bool   success = 1;
  string message = 2;
}

message NewContentAlertRequest {
  string content_title = 1;
  string content_type  = 2;  // "MOVIE" | "SERIES"
  string content_id    = 3;
}

message NewContentAlertResponse {
  bool   success        = 1;
  string message        = 2;
  int32  emails_sent    = 3;
}