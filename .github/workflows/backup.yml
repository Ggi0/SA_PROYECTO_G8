name: DB Backup - Quetxal TV

on:
  schedule:
    - cron: '10 20 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: "Target a respaldar: all o gce"
        required: false
        default: all
        type: choice
        options:
          - all
          - gce
  workflow_call:
    inputs:
      target:
        required: false
        default: all
        type: string

jobs:
  backup:
    name: Backup PostgreSQL externo -> GCS
    if: ${{ inputs.target == '' || inputs.target == 'all' || inputs.target == 'gce' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - name: Backup via SSH to Compute Engine DB
        env:
          GCE_DB_PUBLIC_IP: ${{ secrets.GCE_DB_PUBLIC_IP }}
          GCE_DB_SSH_USER: ${{ secrets.GCE_DB_SSH_USER }}
          GCE_DB_SSH_PRIVATE_KEY: ${{ secrets.GCE_DB_SSH_PRIVATE_KEY }}
          GCS_BACKUP_BUCKET: ${{ secrets.GCS_BACKUP_BUCKET }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          BUCKET="gs://${GCS_BACKUP_BUCKET:-quetxal-tv-${GCP_PROJECT_ID}-backups}"
          TS=$(date +%Y%m%d_%H%M%S)
          KEY_FILE="$RUNNER_TEMP/gce-db-ssh-key"
          printf '%s\n' "$GCE_DB_SSH_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          trap 'rm -f "$KEY_FILE"' EXIT
          backup() {
            C=$1
            FILE="${C}_${TS}.sql.gz"
            echo "Backing up $C"
            ssh -i "$KEY_FILE" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "$GCE_DB_SSH_USER@$GCE_DB_PUBLIC_IP" \
              "docker exec $C sh -c 'pg_dumpall -U \"\$POSTGRES_USER\"'" | gzip > "$FILE"
            gcloud storage cp "$FILE" "$BUCKET/$C/$FILE"
            rm -f "$FILE"
          }
          for C in auth-db subscription-db catalogo-db fx-db notification-db historial-db; do
            backup "$C"
          done
