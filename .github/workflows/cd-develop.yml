name: CD - develop -> Compute Engine

on:
  push:
    branches: [develop]

env:
  REGISTRY: ${{ secrets.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}

jobs:
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  provision-infra:
    name: Infra (Terraform + Ansible)
    needs: ci-gate
    uses: ./.github/workflows/infra.yml
    permissions:
      id-token: write
      contents: read
    secrets: inherit

  build:
    name: Build and push (tag develop)
    needs: [ci-gate, provision-infra]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ secrets.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev -q
      - name: Build application images only
        run: |
          set -euo pipefail
          API_URL="http://${{ needs.provision-infra.outputs.dev_host || secrets.GCE_INSTANCE_IP }}:3000"
          docker build --build-arg VITE_API_URL="$API_URL" --build-arg VITE_GATEWAY_URL="$API_URL" -t $REGISTRY/frontend:develop -f app/frontend/Dockerfile app/frontend
          docker push $REGISTRY/frontend:develop
          for SVC in api-gateway auth-service subscription-service catalogo-service fx-service notification-service historial-service; do
            DIR="app/QuetxalTV/microservices/$SVC"
            [ "$SVC" = "api-gateway" ] && DIR="app/QuetxalTV/api-gateway"
            [ "$SVC" = "auth-service" ] && DIR="app/QuetxalTV/microservices/auth-service/auth-service"
            docker build -t $REGISTRY/$SVC:develop -f $DIR/Dockerfile $DIR
            docker push $REGISTRY/$SVC:develop
          done

  db-migrations:
    name: DB migrations on external VM
    needs: [provision-infra, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy and apply migrations directly to DB VM
        env:
          SSH_USER: ${{ secrets.GCE_SSH_USER }}
          SSH_KEY: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          HOST="${{ needs.provision-infra.outputs.db_public_ip || secrets.GCE_DB_PUBLIC_IP }}"
          for s in HOST SSH_USER SSH_KEY; do
            [ -n "${!s:-}" ] || { echo "::error::Missing $s"; exit 1; }
          done
          KEY_FILE="$RUNNER_TEMP/quetxal_db_key"
          if [[ "$SSH_KEY" == '"'*'"' ]]; then SSH_KEY="${SSH_KEY:1:${#SSH_KEY}-2}"; fi
          printf '%b\n' "$SSH_KEY" | sed 's/\r$//' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          ssh-keygen -y -f "$KEY_FILE" >/dev/null || { echo "::error::Invalid GCE_SSH_PRIVATE_KEY format. Store only the private key contents, without GCE_SSH_PRIVATE_KEY= or wrapping quotes."; exit 1; }
          trap 'rm -f "$KEY_FILE" mig.tgz' EXIT
          tar czf mig.tgz app/QuetxalTV/database/migrations infra/ansible/files/apply-migrations.sh
          scp -i "$KEY_FILE" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null mig.tgz "$SSH_USER@$HOST:/tmp/mig.tgz"
          ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$SSH_USER@$HOST" '
            set -euo pipefail
            sudo rm -rf /tmp/quetxal-mig /opt/quetxal/migrations
            sudo mkdir -p /tmp/quetxal-mig /opt/quetxal/migrations
            sudo tar xzf /tmp/mig.tgz -C /tmp/quetxal-mig
            sudo cp -a /tmp/quetxal-mig/app/QuetxalTV/database/migrations/. /opt/quetxal/migrations/
            sudo cp /tmp/quetxal-mig/infra/ansible/files/apply-migrations.sh /opt/quetxal/apply-migrations.sh
            sudo chmod +x /opt/quetxal/apply-migrations.sh
            sudo bash /opt/quetxal/apply-migrations.sh
          '

  deploy:
    name: Deploy app -> VM dev (external DB)
    needs: [provision-infra, build, db-migrations]
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.provision-infra.outputs.dev_host || secrets.GCE_INSTANCE_IP }}
          username: ${{ secrets.GCE_SSH_USER }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            sudo chown -R "$(id -un):$(id -gn)" /app/SA_PROYECTO_G8
            git config --global --add safe.directory /app/SA_PROYECTO_G8
            cd /app/SA_PROYECTO_G8
            git fetch origin develop
            git checkout develop
            git pull origin develop
            cd app/QuetxalTV
            gcloud auth configure-docker ${{ secrets.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev -q
            touch .env
            set_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env; then
                awk -v key="$key" -v value="$value" 'BEGIN { prefix = key "=" } index($0, prefix) == 1 { $0 = prefix value } { print }' .env > .env.tmp
                mv .env.tmp .env
              else
                printf '%s=%s\n' "$key" "$value" >> .env
              fi
            }
            set_env_if_not_empty() {
              [ -n "${2:-}" ] || return 0
              set_env "$1" "$2"
            }
            DB_IP="${{ needs.provision-infra.outputs.db_private_ip || secrets.GCE_DB_PRIVATE_IP }}"
            ARTIFACT_REGISTRY_LOCATION="${{ secrets.ARTIFACT_REGISTRY_LOCATION }}"
            GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
            ARTIFACT_REGISTRY_REPOSITORY="${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}"
            JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}"
            EXCHANGE_API_URL="${{ secrets.EXCHANGE_API_URL }}"
            [ -n "$EXCHANGE_API_URL" ] || EXCHANGE_API_URL="https://v6.exchangerate-api.com/v6"
            for s in DB_IP ARTIFACT_REGISTRY_LOCATION GCP_PROJECT_ID ARTIFACT_REGISTRY_REPOSITORY JWT_SECRET JWT_ACCESS_SECRET JWT_REFRESH_SECRET; do
              [ -n "${!s:-}" ] || { echo "Missing $s"; exit 1; }
            done
            set_env ARTIFACT_REGISTRY_LOCATION "$ARTIFACT_REGISTRY_LOCATION"
            set_env GCP_PROJECT_ID "$GCP_PROJECT_ID"
            set_env ARTIFACT_REGISTRY_REPOSITORY "$ARTIFACT_REGISTRY_REPOSITORY"
            set_env IMAGE_TAG develop
            set_env FRONTEND_PUBLIC_PORT 8080
            set_env JWT_SECRET "$JWT_SECRET"
            set_env JWT_ACCESS_SECRET "$JWT_ACCESS_SECRET"
            set_env JWT_REFRESH_SECRET "$JWT_REFRESH_SECRET"
            set_env AUTH_DB_HOST "$DB_IP"
            set_env AUTH_DB_PORT 5432
            set_env AUTH_DB_USER "${{ secrets.AUTH_DB_USER }}"
            set_env AUTH_DB_PASSWORD "${{ secrets.AUTH_DB_PASSWORD }}"
            set_env AUTH_DB_NAME "${{ secrets.AUTH_DB_NAME }}"
            set_env AUTH_DB_SCHEMA auth
            set_env AUTH_DB_SSLMODE disable
            set_env SUBSCRIPTION_DB_HOST "$DB_IP"
            set_env SUBSCRIPTION_DB_PORT 5433
            set_env SUBSCRIPTION_DB_USER "${{ secrets.SUBSCRIPTION_DB_USER }}"
            set_env SUBSCRIPTION_DB_PASSWORD "${{ secrets.SUBSCRIPTION_DB_PASSWORD }}"
            set_env SUBSCRIPTION_DB_NAME "${{ secrets.SUBSCRIPTION_DB_NAME }}"
            set_env SUBSCRIPTION_DB_SCHEMA subscription
            set_env SUBSCRIPTION_DB_SSLMODE disable
            set_env CATALOGO_DB_HOST "$DB_IP"
            set_env CATALOGO_DB_PORT 5434
            set_env CATALOGO_DB_USER "${{ secrets.CATALOGO_DB_USER }}"
            set_env CATALOGO_DB_PASSWORD "${{ secrets.CATALOGO_DB_PASSWORD }}"
            set_env CATALOGO_DB_NAME "${{ secrets.CATALOGO_DB_NAME }}"
            set_env CATALOGO_DB_SCHEMA catalog
            set_env CATALOGO_DB_SSLMODE disable
            set_env CATALOG_HTTP_URL http://catalogo-service:8082
            set_env GCS_BUCKET_NAME "${{ needs.provision-infra.outputs.gcs_video_bucket }}"
            set_env_if_not_empty GCS_SERVICE_ACCOUNT_EMAIL "${{ secrets.GCP_SA_EMAIL }}"
            set_env FX_DB_HOST "$DB_IP"
            set_env FX_DB_PORT 5435
            set_env FX_DB_USER "${{ secrets.FX_DB_USER }}"
            set_env FX_DB_PASSWORD "${{ secrets.FX_DB_PASSWORD }}"
            set_env FX_DB_NAME "${{ secrets.FX_DB_NAME }}"
            set_env FX_DB_SCHEMA fx
            set_env FX_DB_SSLMODE disable
            set_env EXCHANGE_API_URL "$EXCHANGE_API_URL"
            set_env NOTIFICATION_DB_HOST "$DB_IP"
            set_env NOTIFICATION_DB_PORT 5436
            set_env NOTIFICATION_DB_USER "${{ secrets.NOTIFICATION_DB_USER }}"
            set_env NOTIFICATION_DB_PASSWORD "${{ secrets.NOTIFICATION_DB_PASSWORD }}"
            set_env NOTIFICATION_DB_NAME "${{ secrets.NOTIFICATION_DB_NAME }}"
            set_env NOTIFICATION_DB_SCHEMA notification
            set_env NOTIFICATION_DB_SSLMODE disable
            set_env HISTORIAL_DB_HOST "$DB_IP"
            set_env HISTORIAL_DB_PORT 5437
            set_env HISTORIAL_DB_USER "${{ secrets.HISTORIAL_DB_USER }}"
            set_env HISTORIAL_DB_PASSWORD "${{ secrets.HISTORIAL_DB_PASSWORD }}"
            set_env HISTORIAL_DB_NAME "${{ secrets.HISTORIAL_DB_NAME }}"
            set_env HISTORIAL_DB_SCHEMA playback
            set_env HISTORIAL_DB_SSLMODE disable
            set_env_if_not_empty SMTP_HOST "${{ secrets.SMTP_HOST }}"
            set_env_if_not_empty SMTP_PORT "${{ secrets.SMTP_PORT }}"
            set_env_if_not_empty SMTP_USER "${{ secrets.SMTP_USER }}"
            set_env_if_not_empty SMTP_PASSWORD "${{ secrets.SMTP_PASSWORD }}"
            set_env_if_not_empty SMTP_FROM "${{ secrets.SMTP_FROM }}"
            set_env_if_not_empty EXCHANGE_API_KEY "${{ secrets.EXCHANGE_API_KEY }}"
            docker compose -f docker-compose.cloud.yml pull
            docker compose -f docker-compose.cloud.yml up -d --remove-orphans
            docker system prune -f

  smoke:
    name: Smoke tests after VM dev deploy
    needs: [provision-infra, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Probe VM dev endpoints
        run: |
          set -euo pipefail
          HOST="${{ needs.provision-infra.outputs.dev_host || secrets.GCE_INSTANCE_IP }}"
          BASE="http://$HOST:3000"
          FRONT="http://$HOST:8080"
          curl -fsS --retry 5 --retry-delay 10 "$BASE/health" >/dev/null
          curl -fsS --retry 5 --retry-delay 10 "$FRONT/" >/dev/null

  backup-after-deploy:
    name: Backup after deploy
    needs: smoke
    uses: ./.github/workflows/backup.yml
    with:
      target: gce
    permissions:
      id-token: write
      contents: read
    secrets: inherit
