name: CD - release → GKE
on:
  push:
    branches: [release]
env:
  REGISTRY: ${{ secrets.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}
  NAMESPACE: quetxal-tv-prod
jobs:
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml
  versioning:
    name: Semantic version tag
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.sv.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calcular versi\xf3n
        id: sv
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^[Vv]2\.' | head -1)
          if [ -z "$LATEST" ]; then NEW="v2.0.0"
          else MINOR=$(echo "$LATEST" | sed 's/[Vv]2\.//;s/\.0$//'); NEW="v2.$((MINOR+1)).0"; fi
          echo "version=$NEW" >> $GITHUB_OUTPUT && echo "🏷️ $NEW"
      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.sv.outputs.version }}
          git push origin ${{ steps.sv.outputs.version }}
  build:
    name: Build & push (${{ needs.versioning.outputs.version }})
    needs: versioning
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      VER: ${{ needs.versioning.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - run: gcloud auth configure-docker ${{ secrets.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev -q
      - name: Build microservicios
        run: |
          docker build --build-arg VITE_API_URL=/api --build-arg VITE_GATEWAY_URL=/api -t ${{ env.REGISTRY }}/frontend:${{ env.VER }} -t ${{ env.REGISTRY }}/frontend:latest -f app/frontend/Dockerfile app/frontend
          docker push ${{ env.REGISTRY }}/frontend:${{ env.VER }}
          docker push ${{ env.REGISTRY }}/frontend:latest

          for SVC in api-gateway auth-service subscription-service catalogo-service fx-service notification-service historial-service; do
            DIR="app/QuetxalTV/microservices/$SVC"
            [ "$SVC" = "api-gateway" ] && DIR="app/QuetxalTV/api-gateway"
            [ "$SVC" = "auth-service" ] && DIR="app/QuetxalTV/microservices/auth-service/auth-service"
            docker build -t ${{ env.REGISTRY }}/$SVC:${{ env.VER }} -t ${{ env.REGISTRY }}/$SVC:latest -f $DIR/Dockerfile $DIR
            docker push ${{ env.REGISTRY }}/$SVC:${{ env.VER }}
            docker push ${{ env.REGISTRY }}/$SVC:latest
          done
      - name: Build bases de datos
        run: |
          for DB in auth-db subscription-db catalogo-db fx-db notification-db historial-db; do
            docker build -t ${{ env.REGISTRY }}/$DB:${{ env.VER }} -t ${{ env.REGISTRY }}/$DB:latest -f app/QuetxalTV/databases/$DB/Dockerfile app/QuetxalTV
            docker push ${{ env.REGISTRY }}/$DB:${{ env.VER }}
            docker push ${{ env.REGISTRY }}/$DB:latest
          done
  deploy:
    name: Deploy → GKE (RollingUpdate + rollback)
    needs: [versioning, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      VER: ${{ needs.versioning.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
      - name: Namespace + ConfigMap
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl config set-context --current --namespace=${{ env.NAMESPACE }}
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/backendconfig.yaml
      - name: Workload Identity para catálogo
        run: |
          gcloud iam service-accounts add-iam-policy-binding "${{ secrets.GCP_SA_EMAIL }}" \
            --role="roles/iam.workloadIdentityUser" \
            --member="serviceAccount:${{ secrets.GCP_PROJECT_ID }}.svc.id.goog[${{ env.NAMESPACE }}/catalogo-service-ksa]" \
            --quiet
          gcloud iam service-accounts add-iam-policy-binding "${{ secrets.GCP_SA_EMAIL }}" \
            --role="roles/iam.serviceAccountTokenCreator" \
            --member="serviceAccount:${{ secrets.GCP_SA_EMAIL }}" \
            --quiet
      - name: Configurar CORS del bucket de videos
        run: |
          gcloud storage buckets update gs://quetxal-tv-videos --cors-file=k8s/gcs-cors.json
      - name: K8s Secrets
        run: |
          kubectl create secret generic quetxal-tv-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}" \
            --from-literal=JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=AUTH_DB_HOST="auth-db" \
            --from-literal=AUTH_DB_PORT="5432" \
            --from-literal=AUTH_DB_USER="${{ secrets.AUTH_DB_USER }}" \
            --from-literal=AUTH_DB_PASSWORD="${{ secrets.AUTH_DB_PASSWORD }}" \
            --from-literal=AUTH_DB_NAME="${{ secrets.AUTH_DB_NAME }}" \
            --from-literal=AUTH_DB_SCHEMA="${{ secrets.AUTH_DB_SCHEMA }}" \
            --from-literal=SUBSCRIPTION_DB_HOST="subscription-db" \
            --from-literal=SUBSCRIPTION_DB_PORT="5432" \
            --from-literal=SUBSCRIPTION_DB_USER="${{ secrets.SUBSCRIPTION_DB_USER }}" \
            --from-literal=SUBSCRIPTION_DB_PASSWORD="${{ secrets.SUBSCRIPTION_DB_PASSWORD }}" \
            --from-literal=SUBSCRIPTION_DB_NAME="${{ secrets.SUBSCRIPTION_DB_NAME }}" \
            --from-literal=SUBSCRIPTION_DB_SCHEMA="${{ secrets.SUBSCRIPTION_DB_SCHEMA }}" \
            --from-literal=CATALOGO_DB_HOST="catalogo-db" \
            --from-literal=CATALOGO_DB_PORT="5432" \
            --from-literal=CATALOGO_DB_USER="${{ secrets.CATALOGO_DB_USER }}" \
            --from-literal=CATALOGO_DB_PASSWORD="${{ secrets.CATALOGO_DB_PASSWORD }}" \
            --from-literal=CATALOGO_DB_NAME="${{ secrets.CATALOGO_DB_NAME }}" \
            --from-literal=CATALOGO_DB_SCHEMA="${{ secrets.CATALOGO_DB_SCHEMA }}" \
            --from-literal=GCS_BUCKET_NAME="quetxal-tv-videos" \
            --from-literal=GCS_SERVICE_ACCOUNT_EMAIL="${{ secrets.GCP_SA_EMAIL }}" \
            --from-literal=FX_DB_HOST="fx-db" \
            --from-literal=FX_DB_PORT="5432" \
            --from-literal=FX_DB_USER="${{ secrets.FX_DB_USER }}" \
            --from-literal=FX_DB_PASSWORD="${{ secrets.FX_DB_PASSWORD }}" \
            --from-literal=FX_DB_NAME="${{ secrets.FX_DB_NAME }}" \
            --from-literal=FX_DB_SCHEMA="${{ secrets.FX_DB_SCHEMA }}" \
            --from-literal=NOTIFICATION_DB_HOST="notification-db" \
            --from-literal=NOTIFICATION_DB_PORT="5432" \
            --from-literal=NOTIFICATION_DB_USER="${{ secrets.NOTIFICATION_DB_USER }}" \
            --from-literal=NOTIFICATION_DB_PASSWORD="${{ secrets.NOTIFICATION_DB_PASSWORD }}" \
            --from-literal=NOTIFICATION_DB_NAME="${{ secrets.NOTIFICATION_DB_NAME }}" \
            --from-literal=NOTIFICATION_DB_SCHEMA="${{ secrets.NOTIFICATION_DB_SCHEMA }}" \
            --from-literal=HISTORIAL_DB_HOST="historial-db" \
            --from-literal=HISTORIAL_DB_PORT="5432" \
            --from-literal=HISTORIAL_DB_USER="${{ secrets.HISTORIAL_DB_USER }}" \
            --from-literal=HISTORIAL_DB_PASSWORD="${{ secrets.HISTORIAL_DB_PASSWORD }}" \
            --from-literal=HISTORIAL_DB_NAME="${{ secrets.HISTORIAL_DB_NAME }}" \
            --from-literal=HISTORIAL_DB_SCHEMA="${{ secrets.HISTORIAL_DB_SCHEMA }}" \
            --from-literal=SMTP_USER="${{ secrets.SMTP_USER }}" \
            --from-literal=SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
            --from-literal=SMTP_FROM="${{ secrets.SMTP_FROM }}" \
            --from-literal=EXCHANGE_API_KEY="${{ secrets.EXCHANGE_API_KEY }}" \
            --save-config --dry-run=client -o yaml | kubectl apply -f -
      - name: ConfigMap de migración de auditoría (subscription)
        run: |
          kubectl create configmap subscription-audit-migration-sql \
            --namespace=${{ env.NAMESPACE }} \
            --from-file=002_audit_upgrade.sql=app/QuetxalTV/microservices/subscription-service/internal/database/migrations/002_audit_upgrade.sql \
            --dry-run=client -o yaml | kubectl apply -f -
          # Borra el Job anterior para forzar su re-ejecución con el SQL vigente.
          kubectl delete job subscription-audit-migration -n ${{ env.NAMESPACE }} --ignore-not-found=true
      - name: Aplicar todos los manifiestos
        run: |
          export IMAGE_TAG="${{ env.VER }}"
          export GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          export GCP_SA_EMAIL="${{ secrets.GCP_SA_EMAIL }}"
          export ARTIFACT_REGISTRY_LOCATION="${{ secrets.ARTIFACT_REGISTRY_LOCATION }}"
          export ARTIFACT_REGISTRY_REPOSITORY="${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}"
          for f in k8s/service-accounts/*.yaml k8s/databases/*.yaml k8s/deployments/*.yaml k8s/services/*.yaml k8s/jobs/*.yaml; do
            envsubst '${IMAGE_TAG} ${GCP_PROJECT_ID} ${GCP_SA_EMAIL} ${ARTIFACT_REGISTRY_LOCATION} ${ARTIFACT_REGISTRY_REPOSITORY}' < "$f" | kubectl apply -f -
          done
          kubectl apply -f k8s/ingress.yaml
      - name: Esperar migración de auditoría (corto-circuito si falla)
        run: |
          JOB=subscription-audit-migration
          if ! kubectl wait --for=condition=complete --timeout=300s job/$JOB -n ${{ env.NAMESPACE }}; then
            echo "❌ Migración de auditoría falló; logs:"
            kubectl logs -n ${{ env.NAMESPACE }} -l app=subscription-audit-migration --tail=200 || true
            kubectl describe job/$JOB -n ${{ env.NAMESPACE }} || true
            exit 1
          fi
          echo "✅ Migración de auditoría aplicada"
      - name: Verificar RollingUpdate + rollback autom\xe1tico
        run: |
          FAILED=0
          ALL="redis auth-db subscription-db catalogo-db fx-db notification-db historial-db auth-service subscription-service catalogo-service fx-service notification-service historial-service frontend api-gateway"
          for DEP in $ALL; do
            echo "⏳ $DEP..."
            if ! kubectl rollout status deployment/$DEP -n ${{ env.NAMESPACE }} --timeout=10m; then
              echo "🔎 Diagnóstico $DEP"
              kubectl get deployment/$DEP -n ${{ env.NAMESPACE }} -o wide || true
              kubectl get pods -n ${{ env.NAMESPACE }} -l app=$DEP -o wide || true
              kubectl describe deployment/$DEP -n ${{ env.NAMESPACE }} || true
              kubectl describe pods -n ${{ env.NAMESPACE }} -l app=$DEP || true
              kubectl logs -n ${{ env.NAMESPACE }} -l app=$DEP --all-containers --tail=200 || true
              kubectl logs -n ${{ env.NAMESPACE }} -l app=$DEP --all-containers --previous --tail=200 || true
              kubectl get events -n ${{ env.NAMESPACE }} --sort-by=.lastTimestamp || true
              echo "❌ Rollback $DEP"
              kubectl rollout undo deployment/$DEP -n ${{ env.NAMESPACE }} || true
              FAILED=1
            else echo "✅ $DEP"; fi
          done
          [ "$FAILED" -eq 0 ] || exit 1
          echo "🎉 Deploy ${{ env.VER }} OK"

  backup-after-deploy:
    name: Backup after deploy
    needs: deploy
    uses: ./.github/workflows/backup.yml
    with:
      target: gke
    permissions:
      id-token: write
      contents: read
    secrets: inherit
