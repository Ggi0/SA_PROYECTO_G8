global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "gce-node-exporters"
    gce_sd_configs:
      - project: "quetxal-tv-g8"
        zone: "us-central1-a"
        port: 9100
    relabel_configs:
      - source_labels: [__meta_gce_instance_name]
        target_label: instance
      - source_labels: [__meta_gce_zone]
        target_label: zone
