    volumes:
      - catalogo_data:/var/lib/postgresql/data
      - /opt/quetxal/sql/catalogo.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

  fx-db:
    image: postgres:16-alpine
    container_name: fx-db
    restart: unless-stopped
    ports: ["5435:5432"]
    environment:
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
      POSTGRES_DB: fx_db
    volumes:
      - fx_data:/var/lib/postgresql/data
      - /opt/quetxal/sql/fx.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    restart: unless-stopped
    ports: ["5436:5432"]
    environment:
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
      POSTGRES_DB: notification_db
    volumes:
      - notification_data:/var/lib/postgresql/data
      - /opt/quetxal/sql/notificacion.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

  historial-db:
