    container_name: historial-db
    restart: unless-stopped
    ports: ["5437:5432"]
    environment:
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
      POSTGRES_DB: historial_db
    volumes:
      - historial_data:/var/lib/postgresql/data
      - /opt/quetxal/sql/historial.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

volumes:
  auth_data: {}
  subscription_data: {}
  catalogo_data: {}
  fx_data: {}
  notification_data: {}
  historial_data: {}