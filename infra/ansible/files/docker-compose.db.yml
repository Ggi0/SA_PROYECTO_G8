services:
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
      POSTGRES_DB: auth_db
    volumes:
      - auth_data:/var/lib/postgresql/data
      - /opt/quetxal/sql/auth.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

  subscription-db:
    image: postgres:16-alpine
    container_name: subscription-db
    restart: unless-stopped
    ports: ["5433:5432"]
    environment:
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
      POSTGRES_DB: subscription_db
    volumes:
      - subscription_data:/var/lib/postgresql/data
      - /opt/quetxal/sql/subscription.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

  catalogo-db:
