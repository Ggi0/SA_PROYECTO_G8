---
- name: Configurar VM de Desarrollo
  hosts: dev
  become: true
  tasks:
    - name: Instalar dependencias base + git + gcloud deps
      apt:
        name: [ca-certificates, curl, gnupg, git, python3-pip]
        update_cache: true

    - name: Clave GPG de Docker
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        keyring: /usr/share/keyrings/docker.gpg
        state: present

    - name: Repositorio de Docker
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable"
        state: present

    - name: Instalar Docker + Compose
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        update_cache: true

    - name: Agregar deployer al grupo docker
      user: { name: deployer, groups: docker, append: true }

    - name: Docker activo
      service: { name: docker, state: started, enabled: true }

    - name: node_exporter (para que Prometheus descubra esta VM por gce_sd)
      community.docker.docker_container:
        name: node-exporter
        image: prom/node-exporter:v1.8.1
        network_mode: host
        restart_policy: unless-stopped

    - name: Crear directorio base de aplicaciones
      file:
        path: /app
        state: directory
        owner: deployer
        group: deployer
        mode: "0755"

    - name: Clonar el repo (entorno develop)
      git:
        repo: "https://github.com/Ggi0/SA_PROYECTO_G8.git"
        dest: /app/SA_PROYECTO_G8
        version: develop
      become_user: deployer
