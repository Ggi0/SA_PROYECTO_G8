---
- name: Configurar VM de Desarrollo
  hosts: dev
  become: true
  vars:
    logstash_host: "{{ lookup('env', 'MONITOR_PRIVATE_IP') | default('10.10.0.9', true) }}"
  tasks:
    - name: Instalar dependencias base + git + gcloud deps
      apt:
        name: [ca-certificates, curl, gnupg, git, python3-pip]
        update_cache: true

    - name: Clave GPG de Docker
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        keyring: /usr/share/keyrings/docker.gpg
        state: present

    - name: Repositorio de Docker
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable"
        state: present

    - name: Instalar Docker + Compose
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        update_cache: true

    - name: Agregar deployer al grupo docker
      user: { name: deployer, groups: docker, append: true }

    - name: Docker activo
      service: { name: docker, state: started, enabled: true }

    - name: node_exporter (para que Prometheus descubra esta VM por gce_sd)
      community.docker.docker_container:
        name: node-exporter
        image: prom/node-exporter:v1.8.1
        network_mode: host
        restart_policy: unless-stopped

    - name: Crear carpeta de Filebeat
      file: { path: /opt/filebeat, state: directory, mode: "0755" }

    - name: Configurar Filebeat para logs de Docker y sistema
      copy:
        dest: /opt/filebeat/filebeat.yml
        mode: "0644"
        content: |
          filebeat.inputs:
            - type: container
              paths: ["/var/lib/docker/containers/*/*.log"]
              processors:
                - add_docker_metadata:
                    host: "unix:///var/run/docker.sock"
            - type: filestream
              id: system-logs
              paths: ["/var/log/*.log"]
          fields:
            environment: gce-dev
            host_role: dev
          fields_under_root: true
          output.logstash:
            hosts: ["{{ logstash_host }}:5044"]

    - name: Filebeat para centralizar logs de la VM de desarrollo
      community.docker.docker_container:
        name: filebeat
        image: docker.elastic.co/beats/filebeat:8.13.4
        user: root
        command: ["filebeat", "-e", "-strict.perms=false"]
        restart_policy: unless-stopped
        volumes:
          - /opt/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
          - /var/lib/docker/containers:/var/lib/docker/containers:ro
          - /var/run/docker.sock:/var/run/docker.sock:ro
          - /var/log:/var/log:ro

    - name: Crear directorio base de aplicaciones
      file:
        path: /app
        state: directory
        owner: deployer
        group: deployer
        mode: "0755"

    - name: Clonar el repo (entorno develop)
      git:
        repo: "https://github.com/Ggi0/SA_PROYECTO_G8.git"
        dest: /app/SA_PROYECTO_G8
        version: develop
      become_user: deployer
