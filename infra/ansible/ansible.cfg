[defaults]
inventory = inventory.ini
host_key_checking = False
private_key_file = ~/.ssh/quetxal_deploy
remote_user = deployer
retry_files_enabled = False
# NO uses 'stdout_callback = yaml' (fue removido de community.general y rompe Ansible).
# La forma moderna de salida legible es:
stdout_callback = default
result_format = yaml

[ssh_connection]
pipelining = True